<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <!-- Obsidian Background -->
  <rect width="1200" height="630" fill="#0A0A0B" />
  
  <!-- Subtle gold background grid -->
  <path d="M0 0 L1200 630 M1200 0 L0 630" stroke="#D4AF37" stroke-width="0.1" opacity="0.2" />
  <circle cx="600" cy="315" r="400" stroke="#D4AF37" stroke-width="0.3" opacity="0.3" stroke-dasharray="5 5" />
  
  <!-- Brand Monogram -->
  <circle cx="600" cy="200" r="70" stroke="#D4AF37" stroke-width="4" fill="#141416" />
  <circle cx="600" cy="200" r="62" stroke="#D4AF37" stroke-width="1" stroke-dasharray="3 3" />
  <text x="600" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="54" font-weight="bold" fill="#D4AF37">LN</text>
  
  <!-- Business Name -->
  <text x="600" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#FFFFFF" letter-spacing="4">SRI LAXMI NARASIMHA JEWELLERY</text>
  
  <!-- Subtitle -->
  <text x="600" y="420" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#D4AF37" letter-spacing="8">KHARAGPUR, WEST BENGAL</text>
  
  <!-- Slogan -->
  <text x="600" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="24" font-style="italic" fill="#AAAAAF">"Legacy of Purity, Masterpieces of Trust"</text>
